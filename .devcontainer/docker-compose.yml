services:
  app:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - ..:/workspace:cached
    ports:
      - "8000:8000"
      - "5173:5173"
    depends_on:
      - db
      - redis
    environment:
      DATABASE_HOST: db
      DATABASE_NAME: djangology
      DATABASE_USER: djangology
      DATABASE_PASS: djangology
      DATABASE_PORT: "5432"
      REDIS_HOST: redis
      REDIS_URL: redis://redis:6379/0
    working_dir: /workspace
    command: sleep infinity

  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: djangology
      POSTGRES_PASSWORD: djangology
      POSTGRES_DB: djangology
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres-data:
